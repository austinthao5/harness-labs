apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: diff-demo
  namespace: austin-gitops-ns
spec:
  serviceName: diff-demo
  replicas: 1
  selector:
    matchLabels:
      app: diff-demo
  template:
    metadata:
      labels:
        app: diff-demo
    spec:
      containers:
      - name: nginx
        image: nginx:1.27
  volumeClaimTemplates:
  - metadata:
      name: data
    spec:
      accessModes:
      - ReadWriteOnce
      resources:
        requests:
          storage: 1Gi
